<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付 - 团湘网络</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
        .nav { position: fixed; top: 0; left: 0; right: 0; padding: 1rem 1.5rem; background: rgba(10,10,10,0.95); z-index: 10; display: flex; align-items: center; justify-content: space-between; }
        .nav .logo { font-size: 1.2rem; font-weight: 700; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.9rem; }
        .pay-container { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 2.5rem; max-width: 420px; width: 100%; text-align: center; margin-top: 60px; }
        h1 { font-size: 1.6rem; margin-bottom: 0.5rem; }
        .order-id { color: rgba(255,255,255,0.5); margin-bottom: 1rem; font-size: 0.85rem; }
        .amount { font-size: 2.5rem; color: #667eea; font-weight: 700; margin: 1rem 0; }
        .qr-section { margin: 1.5rem 0; }
        .qr-section p { color: rgba(255,255,255,0.7); font-size: 0.9rem; margin-bottom: 0.8rem; }
        .qr-img { max-width: 200px; width: 100%; height: auto; border-radius: 8px; background: #fff; padding: 0.5rem; }
        .tips { color: rgba(255,255,255,0.5); font-size: 0.8rem; margin-top: 1rem; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="nav">
        <div class="logo">团湘网络</div>
        <a href="/">← 返回首页</a>
    </div>
    <div class="pay-container">
        <h1>订单支付</h1>
        <p class="order-id">订单号：<span id="orderId">{{ order_id }}</span></p>
        <div class="amount" id="payAmount">¥--</div>
        
        <div class="qr-section">
            <p>请用微信扫码支付</p>
            <img class="qr-img" src="/static/wechat.jpg" alt="微信收款码">
        </div>
        <div class="qr-section">
            <p>或用支付宝扫码支付</p>
            <img class="qr-img" src="/static/alipay.jpg" alt="支付宝收款码">
        </div>
        
        <p class="tips">
            支付完成后请联系客服确认：16603329393<br>
            订单金额以商品页面为准
        </p>
    </div>

    <script>
        // 从订单ID获取金额
        const orderId = document.getElementById('orderId').textContent;
        fetch('/create_order').then(r => r.json()).catch(() => {});
        // 从URL参数读取金额
        const params = new URLSearchParams(window.location.search);
        const amount = params.get('amount') || '--';
        document.getElementById('payAmount').textContent = '¥' + amount;
    </script>
</body>
</html>
